name: Build & Push Image

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "entrypoint.sh"
      - "build.sh"
      - ".github/workflows/build.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PAPER_API: https://api.papermc.io/v2/projects/paper

permissions:
  contents: read
  packages: write

jobs:
  discover:
    name: Discover latest stable versions
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.versions.outputs.matrix }}
      latest: ${{ steps.versions.outputs.latest }}
    steps:
      - name: Fetch & filter PaperMC versions
        id: versions
        run: |
          set -euo pipefail
          # Keep only stable releases (drop -pre / -rc), take the last 5.
          versions="$(curl -fsSL "${PAPER_API}" \
            | jq -c '[.versions[] | select(test("-(pre|rc)"; "i") | not)] | .[-5:]')"
          latest="$(echo "${versions}" | jq -r '.[-1]')"
          matrix="$(echo "${versions}" | jq -c '{version: .}')"
          echo "Discovered stable versions: ${versions}"
          echo "Latest: ${latest}"
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"
          echo "latest=${latest}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.version }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Paper build & checksum
        id: paper
        env:
          VERSION: ${{ matrix.version }}
        run: |
          set -euo pipefail
          version="${VERSION}"
          build="$(curl -fsSL "${PAPER_API}/versions/${version}" | jq -r '.builds[-1]')"
          meta="$(curl -fsSL "${PAPER_API}/versions/${version}/builds/${build}")"
          jar="$(echo "${meta}" | jq -r '.downloads.application.name')"
          sha256="$(echo "${meta}" | jq -r '.downloads.application.sha256')"
          channel="$(echo "${meta}" | jq -r '.channel')"
          echo "Paper ${version} build ${build} (${channel}) -> ${jar}"
          echo "build=${build}"   >> "$GITHUB_OUTPUT"
          echo "jar=${jar}"       >> "$GITHUB_OUTPUT"
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"

      - name: Compute tags
        id: meta
        env:
          VERSION: ${{ matrix.version }}
          LATEST: ${{ needs.discover.outputs.latest }}
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_NAME}"
          image="$(echo "${image}" | tr '[:upper:]' '[:lower:]')"
          tags="${image}:${VERSION}"
          if [ "${VERSION}" = "${LATEST}" ]; then
            tags="${tags},${image}:latest"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            PAPER_VERSION=${{ matrix.version }}
            PAPER_BUILD=${{ steps.paper.outputs.build }}
            PAPER_JAR=${{ steps.paper.outputs.jar }}
            PAPER_SHA256=${{ steps.paper.outputs.sha256 }}
          cache-from: type=gha,scope=${{ matrix.version }}
          cache-to: type=gha,mode=max,scope=${{ matrix.version }}
